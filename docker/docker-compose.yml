services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ark-webui
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - DEFAULT_USER_THEME=dark
    volumes:
      - /opt/ark/data/open-webui:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: ark-litellm
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - /opt/ark/data/litellm/config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml"]
    extra_hosts:
      - "host.docker.internal:host-gateway"

  chromadb:
    image: chromadb/chroma:latest
    container_name: ark-chromadb
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - /opt/ark/data/chromadb:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
      - IS_PERSISTENT=TRUE

  n8n:
    image: n8nio/n8n:latest
    container_name: ark-n8n
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - /opt/ark/data/n8n:/home/node/.n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - GENERIC_TIMEZONE=${TZ:-UTC}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  prometheus:
    image: prom/prometheus:latest
    container_name: ark-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - /opt/ark/data/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - /opt/ark/data/prometheus/data:/prometheus
    command: ['--config.file=/etc/prometheus/prometheus.yml', '--storage.tsdb.retention.time=30d']
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: ark-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - /opt/ark/data/grafana:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus

  kiwix:
    image: ghcr.io/kiwix/kiwix-serve:latest
    container_name: ark-kiwix
    restart: unless-stopped
    ports:
      - "127.0.0.1:8888:8080"
    volumes:
      - /opt/ark/data/kiwix:/data
    command: /data/*.zim
    # Download ZIM files to /opt/ark/data/kiwix/:
    #   Wikipedia:    wget https://download.kiwix.org/zim/wikipedia_en_all_maxi.zim
    #   Khan Academy: wget https://download.kiwix.org/zim/khan_en_all.zim
    #   Stack Overflow: wget https://download.kiwix.org/zim/stack_exchange.zim

  protomaps:
    image: protomaps/go-pmtiles:latest
    container_name: ark-protomaps
    restart: unless-stopped
    ports:
      - "127.0.0.1:8085:8080"
    volumes:
      - /opt/ark/data/protomaps:/data
    command: serve /data
    # Download planet tiles to /opt/ark/data/protomaps/:
    #   wget https://build.protomaps.com/20240101.pmtiles

  arknet:
    build: ../arknet
    container_name: ark-arknet
    restart: unless-stopped
    ports:
      - "8910:8910"
    volumes:
      - /opt/ark/arknet/approved_peers.json:/app/approved_peers.json
    network_mode: host
    environment:
      - ARKNET_NODE_NAME=${HOSTNAME}
      - ARKNET_REGISTRY_ENABLED=false
      - OLLAMA_HOST=http://localhost:11434
      - LITELLM_HOST=http://localhost:4000
      - LITELLM_API_KEY=${LITELLM_MASTER_KEY}

networks:
  default:
    name: ark-net
