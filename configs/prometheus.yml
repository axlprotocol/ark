global:
  scrape_interval: 15s
scrape_configs:
  - job_name: node
    static_configs:
      - targets: ["host.docker.internal:9100"]
  - job_name: ollama
    static_configs:
      - targets: ["host.docker.internal:11434"]
    metrics_path: /metrics
  - job_name: litellm
    static_configs:
      - targets: ["litellm:4000"]
    metrics_path: /metrics/
  - job_name: nvidia_gpu
    static_configs:
      - targets: ["host.docker.internal:9835"]
