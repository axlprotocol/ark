# ARK Nginx Reverse Proxy Configuration
# Domain: set $ARK_DOMAIN or replace ark.local with your domain
# Usage: ln -s /opt/ark/configs/nginx/ark.conf /etc/nginx/sites-enabled/ark.conf

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name ark.local;  # Replace with $ARK_DOMAIN or your actual domain

    client_max_body_size 100M;

    # ── Open WebUI (root) ──────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for Open WebUI streaming
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        proxy_read_timeout  600s;
        proxy_send_timeout  600s;
        proxy_connect_timeout 60s;

        proxy_buffering off;
    }

    # ── LiteLLM API ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:4000/;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  600s;
        proxy_send_timeout  600s;
        proxy_connect_timeout 60s;

        proxy_buffering off;
    }

    # ── Grafana ───────────────────────────────────────────────────────
    location /grafana/ {
        proxy_pass http://127.0.0.1:3001/;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Grafana WebSocket (live features)
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        proxy_read_timeout  600s;
        proxy_send_timeout  600s;
    }

    # ── n8n ───────────────────────────────────────────────────────────
    location /n8n/ {
        proxy_pass http://127.0.0.1:5678/;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # n8n uses WebSockets for the editor
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        proxy_read_timeout  600s;
        proxy_send_timeout  600s;
    }

    # ── ArkNet ────────────────────────────────────────────────────────
    location /arknet/ {
        proxy_pass http://127.0.0.1:8910/;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  600s;
        proxy_send_timeout  600s;
    }

    # ── SSL (uncomment after running certbot) ─────────────────────────
    # To enable SSL:
    #   sudo certbot --nginx -d ark.local
    #
    # listen 443 ssl;
    # ssl_certificate     /etc/letsencrypt/live/ark.local/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/ark.local/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
    #
    # # Redirect HTTP to HTTPS (add as separate server block):
    # # server {
    # #     listen 80;
    # #     server_name ark.local;
    # #     return 301 https://$host$request_uri;
    # # }
}
